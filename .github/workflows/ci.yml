name: CI

on:
  push:
    branches: [main, master]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Harness, portfolio-os e E2E
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Harness estático (plano v2)
        run: npm run harness:verify

      - name: Testes portfolio-os (Node + contrato API)
        run: npm run test:portfolio-os

      - name: Instalar Chromium (Playwright)
        run: npx playwright install --with-deps chromium

      - name: E2E editor work (B19)
        run: npm run test:e2e
        env:
          CI: '1'
