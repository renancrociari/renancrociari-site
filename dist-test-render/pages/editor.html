      </div>
      
      <button class=btn-editor id=btn-new>+ New Document</button>

        <li class=empty-state>Loading...</li>
      </ul>

          <div class=metadata-field>
            <label>Slug</label>
            <input id=meta-slug placeholder=url-friendly-slug>
          </div>
          <div class=metadata-field>
            <label>Summary</label>
            <textarea id=meta-summary placeholder="Brief summary..."></textarea>
          </div>
          <div class=metadata-field style="gap:var(--spacing-sm);grid-template-columns:1fr 1fr;display:grid">
            <div>
              <label>Published</label>
              <select id=meta-published>
                <option value=true>Yes</option>
                <option value=false>No</option>
              </select>
            </div>
            <div>
              <label>Published Date</label>
              <input type=date id=meta-publishedAt>
            </div>
          </div>

          <div id=meta-group-work class=metadata-extra style=display:none>
            <div class=metadata-field>
              <label>Description (SEO / intro)</label>
              <textarea id=meta-w-description rows=3 placeholder="Resumo curto do case…"></textarea>

              <label>Featured image (path)</label>
              <input id=meta-w-featured-image placeholder=../images/case-…/featured.webp>

              <input id=meta-w-tags placeholder="Product Design, User Research">

            <div class=metadata-field>
              <label>OG image (path)</label>
              <input id=meta-w-og-image placeholder=../images/case-og.jpg>
            </div>
            <div class=metadata-field>
              <label>Status</label>
              <select id=meta-w-status>
                <option value=published>published</option>
                <option value=draft>draft</option>
                <option value=protected>protected</option>
              </select>
            </div>
            <div id=meta-w-protected-wrap class=metadata-field style=display:none>
              <label>protected_password (hash bcrypt)</label>
              <input id=meta-w-protected-password placeholder="$2b$10$… ou vazio" autocomplete=off>
            </div>
          </div>

          <div id=meta-group-about class=metadata-extra style=display:none>
            <div class=metadata-field>
              <label>Descrição (hero + SEO)</label>
              <textarea id=meta-a-description rows=3 placeholder="Texto do H1 hero / meta description…"></textarea>
            </div>
            <div class=metadata-field>
              <label>Featured image (path)</label>
              <input id=meta-a-featured-image placeholder=../images/img-renan.webp>
            </div>
            <div class=metadata-field>
              <label>OG image (path)</label>
              <input id=meta-a-og-image placeholder=../images/renan-og-image.jpg>
            </div>
          </div>
        </div>
        
        <textarea class=content-editor id=content-editor placeholder="# Your content here...

- List item
- List item

          </button>
        </div>
      </div>
      <div class=preview-frame-container>
        <iframe id=preview-frame src=/pages/about.html sandbox="allow-same-origin allow-scripts"></iframe>

    </aside>
