  <meta name="viewport" content="initial-scale=1, width=device-width" />
  <title>Loading…</title>
  <script>
    (function () {
      var hash = window.location.hash || '';
      if (!hash || hash.indexOf('password-protected') === -1) {
        window.location.replace(window.location.origin + '/in' + 'dex.html');
        return;
      }
      window.location.replace(window.location.origin + '/in' + 'dex.html' + hash);
    })();
  </script>
