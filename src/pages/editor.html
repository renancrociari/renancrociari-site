<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="initial-scale=1, width=device-width" />
  <title>Content Editor · Renan Crociari</title>
  
  <!-- CSS do site principal para preview fiel -->
  <link rel="stylesheet" href="../styles/global.css" />
  <link rel="stylesheet" href="../styles/reset.css" />
  <link rel="stylesheet" href="../styles/main.css" />
  
  <!-- CSS específico do editor -->
  <style>
    .editor-layout {
      display: grid;
      grid-template-columns: 280px 1fr 1fr;
      height: 100vh;
      overflow: hidden;
    }
    
    .editor-sidebar {
      background: var(--background-gray-medium);
      border-right: 1px solid var(--background-gray-lighter);
      overflow-y: auto;
      padding: var(--spacing-md);
    }
    
    .editor-main {
      overflow-y: auto;
      padding: var(--spacing-lg);
      background: var(--background-body);
    }
    
    .editor-preview {
      display: flex;
      flex-direction: column;
      background: var(--background-body);
      border-left: 1px solid var(--background-gray-lighter);
      overflow: hidden;
    }

    .preview-toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: var(--spacing-sm) var(--spacing-md);
      background: var(--background-gray-medium);
      border-bottom: 1px solid var(--background-gray-lighter);
    }

    .preview-label {
      font-family: var(--font-display);
      font-size: var(--font-xs);
      color: var(--typography-gray-300);
    }

    .viewport-controls {
      display: flex;
      gap: var(--spacing-xs);
    }

    .viewport-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 32px;
      height: 32px;
      background: transparent;
      border: 1px solid var(--background-gray-lighter);
      border-radius: var(--br-xxxs);
      color: var(--typography-gray-300);
      cursor: pointer;
      transition: all 0.2s;
    }

    .viewport-btn:hover {
      background: var(--background-gray-lighter);
      color: var(--typography-gray-200);
    }

    .viewport-btn.active {
      background: var(--typography-green-dark);
      border-color: var(--typography-green-light);
      color: var(--typography-green-light);
    }

    .preview-frame-container {
      flex: 1;
      overflow: auto;
      display: flex;
      justify-content: center;
      background: var(--background-gray-medium);
      padding: var(--spacing-md);
    }

    .editor-preview iframe {
      width: 100%;
      height: 100%;
      border: none;
      background: var(--background-body);
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
      transition: width 0.3s ease;
    }
    
    .doc-list {
      list-style: none;
      padding: 0;
      margin: var(--spacing-md) 0;
    }
    
    .doc-item {
      padding: var(--spacing-sm);
      border-radius: var(--br-xxxs);
      cursor: pointer;
      transition: background 0.2s;
    }
    
    .doc-item:hover {
      background: var(--background-gray-lighter);
    }
    
    .doc-item.active {
      background: var(--typography-green-dark);
    }
    
    .doc-item.unpublished {
      opacity: 0.6;
    }
    
    .editor-toolbar {
      display: flex;
      gap: var(--spacing-sm);
      margin-bottom: var(--spacing-md);
      padding-bottom: var(--spacing-md);
      border-bottom: 1px solid var(--background-gray-lighter);
    }
    
    .btn-editor {
      background: var(--typography-green-light);
      color: var(--background-body);
      border: none;
      padding: var(--spacing-xs) var(--spacing-sm);
      border-radius: var(--br-xxxs);
      cursor: pointer;
      font-family: var(--font-display);
      font-size: var(--font-2xs);
    }
    
    .btn-editor:hover {
      background: var(--typography-green-lighter);
    }
    
    .btn-editor.secondary {
      background: var(--background-gray-lighter);
      color: var(--typography-gray-200);
    }
    
    .metadata-form {
      display: grid;
      gap: var(--spacing-sm);
      margin-bottom: var(--spacing-lg);
    }
    
    .metadata-field {
      display: grid;
      gap: var(--spacing-2xs);
    }
    
    .metadata-field label {
      font-family: var(--font-display);
      font-size: var(--font-2xs);
      color: var(--typography-gray-300);
    }
    
    .metadata-field input,
    .metadata-field textarea,
    .metadata-field select {
      background: var(--background-gray-light);
      border: 1px solid var(--background-gray-lighter);
      color: var(--typography-gray-200);
      padding: var(--spacing-xs);
      border-radius: var(--br-xxxs);
      font-family: var(--font-paragraph);
    }

    .metadata-extra {
      display: grid;
      gap: var(--spacing-sm);
      margin-top: var(--spacing-md);
      padding-top: var(--spacing-md);
      border-top: 1px solid var(--background-gray-lighter);
    }
    
    .content-editor {
      width: 100%;
      min-height: 500px;
      background: var(--background-gray-light);
      border: 1px solid var(--background-gray-lighter);
      color: var(--typography-gray-200);
      padding: var(--spacing-md);
      font-family: var(--font-paragraph);
      font-size: var(--font-md);
      line-height: 1.6;
      resize: vertical;
    }
    
    .collection-tabs {
      display: flex;
      gap: var(--spacing-xs);
      margin-bottom: var(--spacing-md);
    }
    
    .collection-tab {
      padding: var(--spacing-xs) var(--spacing-sm);
      background: transparent;
      border: none;
      color: var(--typography-gray-300);
      cursor: pointer;
      font-family: var(--font-display);
      font-size: var(--font-xs);
    }
    
    .collection-tab.active {
      color: var(--typography-green-light);
      border-bottom: 2px solid var(--typography-green-light);
    }
    
    .empty-state {
      text-align: center;
      padding: var(--spacing-3xl);
      color: var(--typography-gray-300);
    }

    .block-catalog-summary {
      cursor: pointer;
      font-family: var(--font-display);
      font-size: var(--font-xs);
      color: var(--typography-green-light);
      user-select: none;
    }

    .block-catalog-list {
      max-height: 280px;
      overflow-y: auto;
      margin-top: var(--spacing-sm);
      display: flex;
      flex-direction: column;
      gap: var(--spacing-sm);
    }

    .block-catalog-item {
      border: 1px solid var(--background-gray-lighter);
      border-radius: var(--br-xxxs);
      padding: var(--spacing-sm);
      background: var(--background-gray-medium);
    }

    .block-catalog-item h4 {
      margin: 0 0 var(--spacing-2xs) 0;
      font-family: var(--font-display);
      font-size: var(--font-2xs);
      color: var(--typography-gray-200);
    }

    .block-catalog-item .meta {
      font-size: var(--font-2xs);
      color: var(--typography-gray-300);
      margin-bottom: var(--spacing-2xs);
    }

    .block-catalog-item p {
      margin: 0 0 var(--spacing-xs) 0;
      font-size: var(--font-2xs);
      color: var(--typography-gray-300);
      line-height: 1.4;
    }

    .btn-insert-snippet {
      font-size: var(--font-2xs);
      padding: var(--spacing-2xs) var(--spacing-xs);
      background: var(--background-gray-lighter);
      color: var(--typography-gray-200);
      border: 1px solid var(--background-gray-lighter);
      border-radius: var(--br-xxxs);
      cursor: pointer;
      font-family: var(--font-display);
    }

    .btn-insert-snippet:hover {
      border-color: var(--typography-green-light);
      color: var(--typography-green-light);
    }

    .btn-insert-snippet:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }
    
    @media (max-width: 1024px) {
      .editor-layout {
        grid-template-columns: 240px 1fr;
      }
      .editor-preview {
        display: none;
      }
    }
    
    @media (max-width: 768px) {
      .editor-layout {
        grid-template-columns: 1fr;
      }
      .editor-sidebar {
        display: none;
      }
    }
  </style>
</head>

<body>
  <div class="editor-layout">
    <!-- Sidebar: Document List -->
    <aside class="editor-sidebar">
      <div class="collection-tabs">
        <button class="collection-tab active" data-collection="work">Work</button>
        <button class="collection-tab" data-collection="pages">Pages</button>
      </div>
      
      <button class="btn-editor" id="btn-new">+ New Document</button>
      
      <ul class="doc-list" id="doc-list">
        <li class="empty-state">Loading...</li>
      </ul>
    </aside>
    
    <!-- Main: Editor -->
    <main class="editor-main">
      <div id="editor-container" style="display: none;">
        <div class="editor-toolbar">
          <button class="btn-editor" id="btn-save">Save</button>
          <button class="btn-editor secondary" id="btn-preview">Refresh Preview</button>
          <span id="save-status" style="margin-left: auto; color: var(--typography-gray-300); font-size: var(--font-2xs);"></span>
        </div>
        
        <div class="metadata-form" id="metadata-form">
          <div class="metadata-field">
            <label>Title</label>
            <input type="text" id="meta-title" placeholder="Document title" />
          </div>
          <div class="metadata-field">
            <label>Slug</label>
            <input type="text" id="meta-slug" placeholder="url-friendly-slug" />
          </div>
          <div class="metadata-field">
            <label>Summary</label>
            <textarea id="meta-summary" rows="2" placeholder="Brief summary..."></textarea>
          </div>
          <div class="metadata-field" style="display: grid; grid-template-columns: 1fr 1fr; gap: var(--spacing-sm);">
            <div>
              <label>Published</label>
              <select id="meta-published">
                <option value="true">Yes</option>
                <option value="false">No</option>
              </select>
            </div>
            <div>
              <label>Published Date</label>
              <input type="date" id="meta-publishedAt" />
            </div>
          </div>

          <div id="meta-group-work" class="metadata-extra" style="display: none;">
            <div class="metadata-field">
              <label>Description (SEO / intro)</label>
              <textarea id="meta-w-description" rows="3" placeholder="Resumo curto do case…"></textarea>
            </div>
            <div class="metadata-field">
              <label>Featured image (path)</label>
              <input type="text" id="meta-w-featured-image" placeholder="../images/case-…/featured.webp" />
            </div>
            <div class="metadata-field">
              <label>Tags (separadas por vírgula)</label>
              <input type="text" id="meta-w-tags" placeholder="Product Design, User Research" />
            </div>
            <div class="metadata-field">
              <label>OG image (path)</label>
              <input type="text" id="meta-w-og-image" placeholder="../images/case-og.jpg" />
            </div>
            <div class="metadata-field">
              <label>Status</label>
              <select id="meta-w-status">
                <option value="published">published</option>
                <option value="draft">draft</option>
                <option value="protected">protected</option>
              </select>
            </div>
            <div id="meta-w-protected-wrap" class="metadata-field" style="display: none;">
              <label>protected_password (hash bcrypt)</label>
              <input type="text" id="meta-w-protected-password" placeholder="$2b$10$… ou vazio" autocomplete="off" />
            </div>
          </div>

          <div id="meta-group-about" class="metadata-extra" style="display: none;">
            <div class="metadata-field">
              <label>Descrição (hero + SEO)</label>
              <textarea id="meta-a-description" rows="3" placeholder="Texto do H1 hero / meta description…"></textarea>
            </div>
            <div class="metadata-field">
              <label>Featured image (path)</label>
              <input type="text" id="meta-a-featured-image" placeholder="../images/img-renan.webp" />
            </div>
            <div class="metadata-field">
              <label>OG image (path)</label>
              <input type="text" id="meta-a-og-image" placeholder="../images/renan-og-image.jpg" />
            </div>
          </div>
        </div>
        
        <textarea class="content-editor" id="content-editor" placeholder="# Your content here...

Use Markdown syntax for formatting.

## Heading

- List item
- List item

**Bold text** and *italic text*.

[Link text](https://example.com)

![Alt text](/path/to/image.jpg)"></textarea>

        <details class="block-catalog" id="block-catalog-wrap" style="display: none; margin-top: var(--spacing-lg);">
          <summary class="block-catalog-summary">Blocos @portfolio-os/blocks (work-body)</summary>
          <p class="block-catalog-hint body-small" style="color: var(--typography-gray-300); margin: var(--spacing-xs) 0;">
            Inserir snippet MDX no cursor. O preview em Markdown ignora JSX até o pipeline MDX estar ativo.
          </p>
          <div class="block-catalog-list" id="block-catalog-list"></div>
        </details>
      </div>
      
      <div id="empty-editor" class="empty-state">
        <p>Select a document from the sidebar or create a new one.</p>
      </div>
    </main>
    
    <!-- Preview -->
    <aside class="editor-preview">
      <div class="preview-toolbar">
        <div style="display: flex; flex-direction: column; gap: var(--spacing-2xs); align-items: flex-start;">
          <span class="preview-label">Preview</span>
          <label class="preview-label" style="display: flex; align-items: center; gap: var(--spacing-xs); cursor: pointer; font-size: var(--font-2xs); max-width: 220px;">
            <input type="checkbox" id="opt-rewrite-md-images" />
            <span>Prefixar imagens Markdown (<code>../</code>) via portfolio-os/core</span>
          </label>
        </div>
        <div class="viewport-controls">
          <button class="viewport-btn active" data-width="100%" data-height="100%" title="Full">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="3" y="3" width="18" height="18" rx="2"/>
            </svg>
          </button>
          <button class="viewport-btn" data-width="375px" data-height="100%" title="Mobile">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="6" y="3" width="12" height="18" rx="2"/>
            </svg>
          </button>
          <button class="viewport-btn" data-width="768px" data-height="100%" title="Tablet">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="4" y="3" width="16" height="18" rx="2"/>
            </svg>
          </button>
          <button class="viewport-btn" data-width="1024px" data-height="100%" title="Desktop">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="2" y="4" width="20" height="14" rx="2"/>
              <path d="M8 18h8M12 18v3"/>
            </svg>
          </button>
        </div>
      </div>
      <div class="preview-frame-container">
        <iframe id="preview-frame" src="about.html" sandbox="allow-same-origin allow-scripts"></iframe>
      </div>
    </aside>
  </div>

  <script type="module">
    // Import adapters
    import { createLocalAdapterBundle } from '../portfolio-os-integration/adapters/filesystem-adapter.js';
    import { renderEditorPreviewMainHtml } from '../portfolio-os-integration/renderer/shared-renderer.js';
    import { getBlockCatalogEntriesForEditor } from '../portfolio-os-integration/blocks/authorable-blocks-catalog.js';
    
    const adapters = createLocalAdapterBundle();
    let currentCollection = 'work';
    let currentDocument = null;
    let isDirty = false;
    
    // Elements
    const docList = document.getElementById('doc-list');
    const editorContainer = document.getElementById('editor-container');
    const emptyEditor = document.getElementById('empty-editor');
    const contentEditor = document.getElementById('content-editor');
    const previewFrame = document.getElementById('preview-frame');
    const saveStatus = document.getElementById('save-status');
    const blockCatalogWrap = document.getElementById('block-catalog-wrap');
    const blockCatalogList = document.getElementById('block-catalog-list');

    const blockCatalogEntries = getBlockCatalogEntriesForEditor();
    const blockCatalogSnippets = blockCatalogEntries.map((e) => e.snippet || '');

    function updateProtectedPasswordVisibility() {
      const wrap = document.getElementById('meta-w-protected-wrap');
      const sel = document.getElementById('meta-w-status');
      if (!wrap || !sel) return;
      wrap.style.display = sel.value === 'protected' ? 'grid' : 'none';
    }

    function syncMetadataExtraPanels() {
      const slugEl = document.getElementById('meta-slug');
      const slug = slugEl ? slugEl.value.trim() : '';
      const gW = document.getElementById('meta-group-work');
      const gA = document.getElementById('meta-group-about');
      if (!gW || !gA) return;
      if (currentCollection === 'work') {
        gW.style.display = 'grid';
        gA.style.display = 'none';
        updateProtectedPasswordVisibility();
      } else if (currentCollection === 'pages' && slug === 'about') {
        gA.style.display = 'grid';
        gW.style.display = 'none';
      } else {
        gW.style.display = 'none';
        gA.style.display = 'none';
      }
    }
    
    // Load document list
    async function loadDocumentList() {
      const adapter = adapters[currentCollection];
      const docs = await adapter.listDocuments();
      
      docList.innerHTML = '';
      
      if (!docs || docs.length === 0) {
        docList.innerHTML = '<li class="empty-state">No documents yet</li>';
        return;
      }
      
      docs.forEach(doc => {
        const li = document.createElement('li');
        li.className = `doc-item ${doc.published ? '' : 'unpublished'}`;
        li.dataset.id = doc.id;
        li.innerHTML = `
          <div style="font-family: var(--font-display); color: var(--typography-gray-200);">${escapeHtml(doc.title)}</div>
          <div style="font-size: var(--font-2xs); color: var(--typography-gray-300);">${doc.slug}</div>
        `;
        li.addEventListener('click', () => loadDocument(doc.id));
        docList.appendChild(li);
      });
    }
    
    // Load single document
    async function loadDocument(id) {
      const adapter = adapters[currentCollection];
      try {
        const doc = await adapter.loadDocument(id);
        currentDocument = doc;
        
        // Update UI
        document.querySelectorAll('.doc-item').forEach(el => el.classList.remove('active'));
        document.querySelector(`[data-id="${id}"]`)?.classList.add('active');
        
        // Fill form
        document.getElementById('meta-title').value = doc.metadata.title || '';
        document.getElementById('meta-slug').value = doc.slug || '';
        document.getElementById('meta-summary').value = doc.metadata.summary || '';
        document.getElementById('meta-published').value =
          doc.metadata.published === false || doc.metadata.published === 'false' ? 'false' : 'true';
        document.getElementById('meta-publishedAt').value = doc.metadata.publishedAt || '';
        contentEditor.value = doc.content || '';

        ['meta-w-description', 'meta-w-featured-image', 'meta-w-tags', 'meta-w-og-image', 'meta-w-protected-password', 'meta-a-description', 'meta-a-featured-image', 'meta-a-og-image'].forEach((id) => {
          const el = document.getElementById(id);
          if (el) el.value = '';
        });
        syncMetadataExtraPanels();
        if (currentCollection === 'work') {
          document.getElementById('meta-w-description').value = doc.metadata.description || '';
          document.getElementById('meta-w-featured-image').value = doc.metadata.featured_image || '';
          const t = doc.metadata.tags;
          document.getElementById('meta-w-tags').value = Array.isArray(t) ? t.join(', ') : (t || '');
          document.getElementById('meta-w-og-image').value = doc.metadata.og_image || '';
          const st = doc.metadata.status || 'published';
          document.getElementById('meta-w-status').value =
            st === 'draft' || st === 'protected' || st === 'published' ? st : 'published';
          document.getElementById('meta-w-protected-password').value =
            doc.metadata.protected_password && doc.metadata.protected_password !== 'null'
              ? String(doc.metadata.protected_password)
              : '';
          updateProtectedPasswordVisibility();
        } else if (currentCollection === 'pages' && doc.slug === 'about') {
          document.getElementById('meta-a-description').value = doc.metadata.description || '';
          document.getElementById('meta-a-featured-image').value = doc.metadata.featured_image || '';
          document.getElementById('meta-a-og-image').value = doc.metadata.og_image || '';
        }
        
        // Show editor
        emptyEditor.style.display = 'none';
        editorContainer.style.display = 'block';
        syncBlockCatalogPanel();
        
        // Update preview
        updatePreview();
        
        isDirty = false;
        saveStatus.textContent = '';
      } catch (err) {
        alert('Error loading document: ' + err.message);
      }
    }
    
    // Save document
    async function saveDocument() {
      if (!currentDocument) return;
      
      const adapter = adapters[currentCollection];
      const metadata = {
        ...currentDocument.metadata,
        title: document.getElementById('meta-title').value,
        summary: document.getElementById('meta-summary').value,
        published: document.getElementById('meta-published').value,
        publishedAt: document.getElementById('meta-publishedAt').value,
      };

      if (currentCollection === 'work') {
        metadata.description = document.getElementById('meta-w-description').value.trim();
        metadata.featured_image = document.getElementById('meta-w-featured-image').value.trim();
        const tagsArr = document.getElementById('meta-w-tags').value
          .split(',')
          .map((s) => s.trim())
          .filter(Boolean);
        if (tagsArr.length) metadata.tags = tagsArr;
        else delete metadata.tags;
        const ogW = document.getElementById('meta-w-og-image').value.trim();
        if (ogW) metadata.og_image = ogW;
        else delete metadata.og_image;
        metadata.status = document.getElementById('meta-w-status').value;
        if (metadata.status !== 'protected') {
          delete metadata.protected_password;
        } else {
          const pw = document.getElementById('meta-w-protected-password').value.trim();
          if (pw) metadata.protected_password = pw;
          else delete metadata.protected_password;
        }
      } else if (currentCollection === 'pages') {
        const slug = document.getElementById('meta-slug').value.trim();
        if (slug === 'about') {
          metadata.description = document.getElementById('meta-a-description').value.trim();
          metadata.featured_image = document.getElementById('meta-a-featured-image').value.trim();
          const ogA = document.getElementById('meta-a-og-image').value.trim();
          if (ogA) metadata.og_image = ogA;
          else delete metadata.og_image;
        }
      }
      
      try {
        await adapter.saveDocument(currentDocument.id, metadata, contentEditor.value);
        isDirty = false;
        saveStatus.textContent = 'Saved!';
        setTimeout(() => saveStatus.textContent = '', 2000);
        loadDocumentList();
        updatePreview();
      } catch (err) {
        saveStatus.textContent = 'Error: ' + err.message;
      }
    }
    
    // Mapeamento de documentos para bodyClass do site real
    const BODY_CLASS_MAP = {
      // Pages
      'pages/home': 'home',
      'pages/about': 'about',
      // Work - mapeado por slug
      'work/farfetch-performance': 'farfetch',
      'work/dating-platform': 'sl-mobile',
      'work/journal-finder': 'journal-finder',
    };

    function getBodyClass(collection, slug) {
      const key = `${collection}/${slug}`;
      return BODY_CLASS_MAP[key] || (collection === 'pages' ? 'default-page' : 'case-study');
    }

    // Carrega componente HTML via fetch
    async function loadComponent(url) {
      try {
        const response = await fetch(url);
        if (!response.ok) return '';
        return await response.text();
      } catch (err) {
        console.warn(`Failed to load component: ${url}`, err);
        return '';
      }
    }

    // Update preview - Preview fiel ao site real
    async function updatePreview() {
      if (!currentDocument) return;

      const slug = document.getElementById('meta-slug').value || currentDocument.slug || '';
      const bodyClass = getBodyClass(currentCollection, slug);

      const mergedMetadata = {
        ...currentDocument.metadata,
        title: document.getElementById('meta-title').value,
        summary: document.getElementById('meta-summary').value,
        published: document.getElementById('meta-published').value,
        publishedAt: document.getElementById('meta-publishedAt').value,
      };
      if (currentCollection === 'work') {
        mergedMetadata.description = document.getElementById('meta-w-description').value.trim();
        mergedMetadata.featured_image = document.getElementById('meta-w-featured-image').value.trim();
        const tagsArr = document.getElementById('meta-w-tags').value
          .split(',')
          .map((s) => s.trim())
          .filter(Boolean);
        if (tagsArr.length) mergedMetadata.tags = tagsArr;
        else delete mergedMetadata.tags;
        mergedMetadata.og_image = document.getElementById('meta-w-og-image').value.trim();
        mergedMetadata.status = document.getElementById('meta-w-status').value;
        const pwp = document.getElementById('meta-w-protected-password').value.trim();
        if (pwp) mergedMetadata.protected_password = pwp;
        else delete mergedMetadata.protected_password;
      } else if (currentCollection === 'pages') {
        const s = document.getElementById('meta-slug').value.trim();
        if (s === 'about') {
          mergedMetadata.description = document.getElementById('meta-a-description').value.trim();
          mergedMetadata.featured_image = document.getElementById('meta-a-featured-image').value.trim();
          mergedMetadata.og_image = document.getElementById('meta-a-og-image').value.trim();
        }
      }
      const content = contentEditor.value;

      const rewriteChk = document.getElementById('opt-rewrite-md-images');
      const rewriteMarkdownImageBase =
        rewriteChk && rewriteChk.checked ? '../' : undefined;

      const mainContent = renderEditorPreviewMainHtml({
        collection: currentCollection,
        slug,
        metadata: mergedMetadata,
        markdownBody: content,
        rewriteMarkdownImageBase,
      });

      // Carrega componentes do site real (mesmos usados nas páginas reais)
      const [navbar, footer, emailDialog, passwordDialog] = await Promise.all([
        loadComponent('../components/navbar.html'),
        loadComponent('../components/footer.html'),
        loadComponent('../components/email-dialog.html'),
        loadComponent('../components/password-dialog.html'),
      ]);

      const safeSlugForAuth = String(slug).replace(/[^a-zA-Z0-9-_]/g, '') || 'study';
      const contentAuthId = `case-${safeSlugForAuth}`;
      const previewHeadProtected =
        currentCollection === 'work' &&
        String(mergedMetadata.status) === 'protected' &&
        mergedMetadata.protected_password
          ? `<script type="module">
    import { isAuthenticated } from '../scripts/password-auth.js';
    if (!isAuthenticated('${contentAuthId}')) {
      sessionStorage.setItem('rc_attempted_url', window.location.pathname);
      window.location.href = '/#password-protected?content=${contentAuthId}';
    }
  <\/script>`
          : '';
      const ogRel = mergedMetadata.og_image ? String(mergedMetadata.og_image).trim() : '';
      const previewOgMeta = ogRel
        ? `<meta property="og:image" content="${escapeHtml(ogRel)}" />\n  `
        : '';

      // Monta HTML completo idêntico ao site real
      const fullHtml = `<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="initial-scale=1, width=device-width" />
  <title>${escapeHtml(mergedMetadata.title || 'Preview')} · Preview</title>
  ${previewOgMeta}${previewHeadProtected}
  <!-- Mesmo CSS do site real -->
  <link rel="stylesheet" href="../styles/global.css" />
  <link rel="stylesheet" href="../styles/reset.css" />
  <link rel="stylesheet" href="../styles/main.css" />
  <!-- Fonts -->
  <link rel="preload" href="../fonts/degular.woff2" as="font" type="font/woff2" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@700&text=renancrociari" rel="stylesheet">
  <!-- Preview badge style -->
  <style>
    .preview-badge {
      position: fixed;
      top: var(--spacing-sm);
      right: var(--spacing-sm);
      background: var(--typography-green-light);
      color: var(--background-body);
      padding: var(--spacing-xs) var(--spacing-sm);
      border-radius: var(--br-xxxs);
      font-family: var(--font-display);
      font-size: var(--font-2xs);
      z-index: 10000;
      pointer-events: none;
    }
  </style>
</head>
<body class="${bodyClass}">
  <!-- Badge de preview -->
  <div class="preview-badge">PREVIEW MODE</div>

  <!-- Componentes do site real -->
  ${emailDialog}
  ${navbar}

  <!-- Conteúdo renderizado (mesmo HTML que build: home / about / work / página genérica) -->
  ${mainContent}

  ${passwordDialog}
  ${footer}

  <!-- Script mínimo para interatividade básica -->
  <script type="module">
    // Email dialog functionality
    const emailDialog = document.querySelector('.dialog-show-email');
    const showEmailBtns = document.querySelectorAll('.btn-show-email');
    const closeEmailBtn = document.querySelector('.btn-close-email');
    const copyEmailBtn = document.querySelector('.btn-copy-email');

    showEmailBtns.forEach(btn => {
      btn.addEventListener('click', () => {
        if (emailDialog) emailDialog.showModal();
      });
    });

    if (closeEmailBtn && emailDialog) {
      closeEmailBtn.addEventListener('click', () => {
        emailDialog.close();
      });
    }

    if (copyEmailBtn) {
      copyEmailBtn.addEventListener('click', async () => {
        try {
          await navigator.clipboard.writeText('me@renancrociari.com');
          copyEmailBtn.textContent = 'Copied!';
          setTimeout(() => copyEmailBtn.textContent = 'Copy', 2000);
        } catch (err) {
          copyEmailBtn.textContent = 'Error';
        }
      });
    }

    // Navbar mobile toggle
    const navToggle = document.querySelector('.mobile-nav-toggle');
    const mainNav = document.querySelector('.main-nav-list');

    if (navToggle && mainNav) {
      navToggle.addEventListener('click', () => {
        const isVisible = mainNav.getAttribute('data-visible') === 'true';
        mainNav.setAttribute('data-visible', !isVisible);
        navToggle.setAttribute('aria-expanded', !isVisible);
      });
    }
  <\/script>
</body>
</html>`;

      // Atualiza iframe com preview fiel
      const previewDoc = previewFrame.contentDocument;
      previewDoc.open();
      previewDoc.write(fullHtml);
      previewDoc.close();
    }

    // Create new document
    async function createDocument() {
      const title = prompt('Enter document title:');
      if (!title) return;
      
      const slug = prompt('Enter slug (optional, will be auto-generated):');
      
      const adapter = adapters[currentCollection];
      try {
        const result = await adapter.createDocument(title, slug || undefined);
        loadDocumentList();
        loadDocument(result.entry.id);
      } catch (err) {
        alert('Error creating document: ' + err.message);
      }
    }
    
    // Utility
    function escapeHtml(text) {
      if (!text) return '';
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    function initBlockCatalog() {
      blockCatalogList.innerHTML = blockCatalogEntries
        .map(
          (e, idx) => `
        <div class="block-catalog-item">
          <h4>${escapeHtml(e.componentName)}</h4>
          <div class="meta">${escapeHtml(e.category)}</div>
          <p>${escapeHtml(e.description)}</p>
          <button type="button" class="btn-insert-snippet" data-snippet-idx="${idx}" ${e.snippet ? '' : 'disabled'}>
            Inserir snippet
          </button>
        </div>`
        )
        .join('');

      blockCatalogList.addEventListener('click', (ev) => {
        const btn = ev.target.closest('.btn-insert-snippet');
        if (!btn || btn.disabled) return;
        const idx = parseInt(btn.getAttribute('data-snippet-idx'), 10);
        const snippet = blockCatalogSnippets[idx];
        if (!snippet) return;
        insertSnippetAtCursor(contentEditor, snippet);
        isDirty = true;
        saveStatus.textContent = 'Unsaved changes';
        updatePreview();
      });
    }

    function insertSnippetAtCursor(textarea, snippet) {
      const ins = `\n\n${snippet.trim()}\n\n`;
      const start = textarea.selectionStart ?? textarea.value.length;
      const end = textarea.selectionEnd ?? textarea.value.length;
      const before = textarea.value.slice(0, start);
      const after = textarea.value.slice(end);
      textarea.value = before + ins + after;
      const pos = start + ins.length;
      textarea.selectionStart = textarea.selectionEnd = pos;
      textarea.focus();
    }

    function syncBlockCatalogPanel() {
      if (!blockCatalogWrap) return;
      const show = currentCollection === 'work' && editorContainer.style.display !== 'none';
      blockCatalogWrap.style.display = show ? 'block' : 'none';
    }
    
    // Event listeners
    document.querySelectorAll('.collection-tab').forEach(tab => {
      tab.addEventListener('click', () => {
        document.querySelectorAll('.collection-tab').forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        currentCollection = tab.dataset.collection;
        currentDocument = null;
        editorContainer.style.display = 'none';
        emptyEditor.style.display = 'block';
        syncMetadataExtraPanels();
        syncBlockCatalogPanel();
        loadDocumentList();
      });
    });
    
    document.getElementById('btn-new').addEventListener('click', createDocument);
    document.getElementById('btn-save').addEventListener('click', saveDocument);
    document.getElementById('btn-preview').addEventListener('click', updatePreview);

    function onMetadataFormUpdate(e) {
      const tid = e.target.id;
      if (!currentDocument || !tid || !tid.startsWith('meta-')) return;
      if (tid === 'meta-slug') syncMetadataExtraPanels();
      if (tid === 'meta-w-status') updateProtectedPasswordVisibility();
      updatePreview();
    }
    document.getElementById('metadata-form').addEventListener('input', onMetadataFormUpdate);
    document.getElementById('metadata-form').addEventListener('change', onMetadataFormUpdate);

    document.getElementById('opt-rewrite-md-images')?.addEventListener('change', () => {
      if (currentDocument) updatePreview();
    });
    
    contentEditor.addEventListener('input', () => {
      isDirty = true;
      saveStatus.textContent = 'Unsaved changes';
    });

    // Viewport controls para responsividade
    document.querySelectorAll('.viewport-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.viewport-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');

        const width = btn.dataset.width;
        const height = btn.dataset.height;

        previewFrame.style.width = width;
        if (height !== '100%') {
          previewFrame.style.height = height;
        } else {
          previewFrame.style.height = '100%';
        }
      });
    });

    // Keyboard shortcuts
    document.addEventListener('keydown', (e) => {
      if ((e.metaKey || e.ctrlKey) && e.key === 's') {
        e.preventDefault();
        saveDocument();
      }
    });
    
    // Init
    initBlockCatalog();
    syncBlockCatalogPanel();
    loadDocumentList();
  </script>
</body>

</html>
