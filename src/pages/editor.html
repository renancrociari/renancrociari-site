<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Editor · Portfolio OS</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      min-height: 100%;
      font-family: system-ui, sans-serif;
    }

    body {
      background: #f5f5f5;
      display: grid;
      place-items: center;
      color: #111;
    }

    .editor-loading {
      width: min(480px, calc(100vw - 32px));
      padding: 24px;
      border: 1px solid rgba(0, 0, 0, 0.08);
      background: #fff;
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.08);
    }

    .editor-loading h1 {
      margin: 0 0 8px;
      font-size: 20px;
      line-height: 28px;
    }

    .editor-loading p {
      margin: 0;
      font-size: 14px;
      line-height: 22px;
      color: rgba(17, 17, 17, 0.72);
    }
  </style>
</head>
<body>
  <div class="editor-loading">
    <h1>Abrindo o editor…</h1>
    <p>O editor original roda no sidecar local e será aberto automaticamente.</p>
  </div>
  <script type="module">
    import { resolveDevApiRoot } from '../portfolio-os-integration/lib/dev-api-root.js';

    async function redirectToEditor() {
      const root = await resolveDevApiRoot();
      const target = `${root}/editor`;
      window.location.replace(target);
    }

    redirectToEditor().catch((error) => {
      console.error(error);
      document.querySelector('.editor-loading p').textContent =
        'Não foi possível localizar o sidecar do editor. Rode `npm start` na raiz do projeto.';
    });
  </script>
</body>
</html>
